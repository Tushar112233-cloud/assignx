openapi: 3.0.3
info:
  title: AssignX API
  description: |
    Backend API for the AssignX platform. Serves user-web, doer-web,
    supervisor-web, admin-web frontends and mobile apps.

    Authentication is OTP-based passwordless. JWTs are issued on verify/login
    and must be sent as `Authorization: Bearer <token>`.

    All responses use camelCase field names internally but many endpoints
    also include snake_case aliases for frontend compatibility.
  version: 1.0.0
  contact:
    name: AssignX Team

servers:
  - url: http://localhost:4000/api
    description: Local development server

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication, OTP, signup, token management
  - name: Users
    description: User profile management (also aliased at /api/profiles)
  - name: Upload
    description: File upload and deletion (Cloudinary)
  - name: Doers
    description: Doer profile, skills, reviews, activation
  - name: Supervisors
    description: Supervisor profile, activation, dashboard, reviews
  - name: Projects
    description: Project creation, management, assignments, deliverables, and grading
  - name: Chat
    description: Chat rooms, messages, file sharing, and moderation
  - name: Wallet
    description: Wallet balance, transactions, earnings, payouts, and transfers
  - name: Notifications
    description: User notifications (read, unread, delete)
  - name: Support
    description: Support tickets, messages, FAQs, and feedback
  - name: Community
    description: Community posts, pro-network, business-hub, comments, likes
  - name: Marketplace
    description: Marketplace listings, favorites, tutors, sessions
  - name: Experts
    description: Expert profiles, bookings, availability, reviews
  - name: Training
    description: Training modules, progress, quizzes
  - name: Reference
    description: Reference data (subjects, skills, universities, styles)
  - name: Payments
    description: Razorpay orders, verification, wallet pay, partial pay
  - name: Resources
    description: Learning resources, tools, training videos, pricing
  - name: Connect
    description: Q&A community questions, answers, voting
  - name: AccessRequests
    description: Access request checking and submission
  - name: Jobs
    description: Job listings, applications, stats
  - name: Investors
    description: Investor profiles, pitch decks
  - name: Admin
    description: Admin dashboard, user management, analytics, CRM
  - name: Health
    description: Health check

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /auth/verify or /auth/login

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number (1-based)
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Items per page

  schemas:
    # ------------------------------------------------------------------ Errors
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        status:
          type: integer
        stack:
          type: string
          description: Stack trace (development only)

    # ------------------------------------------------------------------ Auth
    TokenResponse:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'
        profile:
          $ref: '#/components/schemas/AuthUser'

    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, doer, supervisor, admin]
        userType:
          type: string
        onboardingCompleted:
          type: boolean

    # ------------------------------------------------------------------ User
    User:
      type: object
      properties:
        _id:
          type: string
        id:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
        full_name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        userType:
          type: string
          enum: [student, professional, business]
        user_type:
          type: string
        phone:
          type: string
          nullable: true
        is_active:
          type: boolean
        onboardingCompleted:
          type: boolean
        onboardingStep:
          type: integer
        universityId:
          type: string
          nullable: true
        courseId:
          type: string
          nullable: true
        semester:
          type: integer
          nullable: true
        yearOfStudy:
          type: integer
          nullable: true
        preferences:
          type: object
          additionalProperties: true
        wallet:
          $ref: '#/components/schemas/UserWallet'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserWallet:
      type: object
      nullable: true
      properties:
        id:
          type: string
        user_id:
          type: string
        balance:
          type: number
        currency:
          type: string

    Subject:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
        category:
          type: string
          nullable: true

    Referral:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        code:
          type: string
        totalReferrals:
          type: integer
        totalEarnings:
          type: number
        createdAt:
          type: string
          format: date-time

    PaymentMethod:
      type: object
      properties:
        id:
          type: string
        createdAt:
          type: string
          format: date-time
      additionalProperties: true

    # ------------------------------------------------------------------ Upload
    UploadResult:
      type: object
      properties:
        success:
          type: boolean
        url:
          type: string
        publicId:
          type: string
        bytes:
          type: integer

    # ------------------------------------------------------------------ Doer
    Doer:
      type: object
      properties:
        _id:
          type: string
        id:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
        full_name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        isActivated:
          type: boolean
        is_activated:
          type: boolean
        isAvailable:
          type: boolean
        is_available:
          type: boolean
        qualification:
          type: string
          nullable: true
        universityName:
          type: string
          nullable: true
        university_name:
          type: string
          nullable: true
        experienceLevel:
          type: string
          nullable: true
        experience_level:
          type: string
          nullable: true
        yearsOfExperience:
          type: number
          nullable: true
        years_of_experience:
          type: number
          nullable: true
        bio:
          type: string
          nullable: true
        maxConcurrentProjects:
          type: integer
        max_concurrent_projects:
          type: integer
        totalEarnings:
          type: number
        total_earnings:
          type: number
        totalProjectsCompleted:
          type: integer
        total_projects_completed:
          type: integer
        averageRating:
          type: number
        average_rating:
          type: number
        totalReviews:
          type: integer
        total_reviews:
          type: integer
        successRate:
          type: number
        success_rate:
          type: number
        onTimeDeliveryRate:
          type: number
        on_time_delivery_rate:
          type: number
        trainingCompleted:
          type: boolean
        onboardingCompleted:
          type: boolean
        onboarding_completed:
          type: boolean
        skills:
          type: array
          items:
            type: string
        subjects:
          type: array
          items:
            type: string
        bankDetails:
          $ref: '#/components/schemas/BankDetails'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DoerStats:
      type: object
      properties:
        activeAssignments:
          type: integer
        completedProjects:
          type: integer
        totalEarnings:
          type: number
        pendingEarnings:
          type: number
        averageRating:
          type: number
        totalReviews:
          type: integer
        successRate:
          type: number
        onTimeDeliveryRate:
          type: number
        qualityRating:
          type: number
        timelinessRating:
          type: number
        communicationRating:
          type: number

    DoerActivation:
      type: object
      nullable: true
      properties:
        doerId:
          type: string
        trainingCompleted:
          type: boolean
        quizPassed:
          type: boolean
        isActivated:
          type: boolean

    Review:
      type: object
      properties:
        id:
          type: string
        doer_id:
          type: string
        project_id:
          type: string
        rating:
          type: number
        review:
          type: string
        source:
          type: string
          enum: [user, supervisor]
        reviewer_name:
          type: string
          nullable: true
        reviewer_avatar:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    BankDetails:
      type: object
      properties:
        accountName:
          type: string
        accountNumber:
          type: string
        ifscCode:
          type: string
        bankName:
          type: string
        upiId:
          type: string
        verified:
          type: boolean

    # ---------------------------------------------------------------- Supervisor
    Supervisor:
      type: object
      properties:
        _id:
          type: string
        id:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        isActivated:
          type: boolean
        is_activated:
          type: boolean
        isAvailable:
          type: boolean
        is_available:
          type: boolean
        isAccessGranted:
          type: boolean
        is_access_granted:
          type: boolean
        yearsOfExperience:
          type: number
        years_of_experience:
          type: number
        averageRating:
          type: number
        average_rating:
          type: number
        totalReviews:
          type: integer
        total_reviews:
          type: integer
        totalEarnings:
          type: number
        total_earnings:
          type: number
        expertise:
          type: array
          items:
            type: string
        bankDetails:
          $ref: '#/components/schemas/BankDetails'
        bank_name:
          type: string
          nullable: true
        bank_account_number:
          type: string
          nullable: true
        bank_account_name:
          type: string
          nullable: true
        bank_ifsc_code:
          type: string
          nullable: true
        upi_id:
          type: string
          nullable: true
        bank_verified:
          type: boolean
        onboardingCompleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SupervisorActivation:
      type: object
      properties:
        supervisorId:
          type: string
        trainingCompleted:
          type: boolean
        quizPassed:
          type: boolean
        isActivated:
          type: boolean

    SupervisorStats:
      type: object
      properties:
        totalProjects:
          type: integer
        activeProjects:
          type: integer
        completedProjects:
          type: integer
        pendingQuotes:
          type: integer
        totalEarnings:
          type: number
        pendingEarnings:
          type: number
        averageRating:
          type: number
        totalDoers:
          type: integer

    SupervisorDashboard:
      type: object
      properties:
        activeProjects:
          type: integer
        totalProjects:
          type: integer
        availableDoers:
          type: integer
        totalEarnings:
          type: number
        averageRating:
          type: number
        totalReviews:
          type: integer

    # ---------------------------------------------------------------- Project
    Project:
      type: object
      properties:
        _id:
          type: string
        id:
          type: string
        title:
          type: string
        description:
          type: string
        subject:
          type: string
          nullable: true
        projectType:
          type: string
          nullable: true
        project_type:
          type: string
          nullable: true
        budget:
          type: number
          nullable: true
        userQuote:
          type: number
          nullable: true
        user_quote:
          type: number
          nullable: true
        doerPayout:
          type: number
          nullable: true
        doer_payout:
          type: number
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum:
            - pending
            - quoted
            - accepted
            - assigned
            - in_progress
            - under_review
            - revision_requested
            - completed
            - cancelled
            - pool
        userId:
          type: string
        user_id:
          type: string
        doerId:
          type: string
          nullable: true
        doer_id:
          type: string
          nullable: true
        supervisorId:
          type: string
          nullable: true
        supervisor_id:
          type: string
          nullable: true
        files:
          type: array
          items:
            $ref: '#/components/schemas/ProjectFile'
        deliverables:
          type: array
          items:
            $ref: '#/components/schemas/ProjectFile'
        revisions:
          type: array
          items:
            $ref: '#/components/schemas/Revision'
        timeline:
          type: array
          items:
            $ref: '#/components/schemas/TimelineEntry'
        grade:
          type: string
          nullable: true
        feedback:
          type: string
          nullable: true
        liveDocumentUrl:
          type: string
          nullable: true
        live_document_url:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        isPoolProject:
          type: boolean
        is_pool_project:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectFile:
      type: object
      properties:
        id:
          type: string
        file_name:
          type: string
        file_url:
          type: string
        file_type:
          type: string
          nullable: true
        file_size_bytes:
          type: integer
          nullable: true
        file_category:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Revision:
      type: object
      properties:
        id:
          type: string
        feedback:
          type: string
        specificChanges:
          type: string
          nullable: true
        requestedBy:
          type: string
        requestedAt:
          type: string
          format: date-time

    TimelineEntry:
      type: object
      properties:
        action:
          type: string
        performedBy:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time

    Quote:
      type: object
      properties:
        userQuote:
          type: number
        doerPayout:
          type: number
        quotedBy:
          type: string
        quotedAt:
          type: string
          format: date-time

    # ---------------------------------------------------------------- Chat
    ChatRoom:
      type: object
      properties:
        _id:
          type: string
        id:
          type: string
        projectId:
          type: string
          nullable: true
        project_id:
          type: string
          nullable: true
        roomType:
          type: string
          enum: [project, direct, group]
        room_type:
          type: string
        name:
          type: string
          nullable: true
        participants:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
              role:
                type: string
              joinedAt:
                type: string
                format: date-time
        isSuspended:
          type: boolean
        is_suspended:
          type: boolean
        suspendReason:
          type: string
          nullable: true
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ChatMessage:
      type: object
      properties:
        _id:
          type: string
        id:
          type: string
        roomId:
          type: string
        room_id:
          type: string
        senderId:
          type: string
        sender_id:
          type: string
        senderName:
          type: string
          nullable: true
        sender_name:
          type: string
          nullable: true
        senderRole:
          type: string
          nullable: true
        sender_role:
          type: string
          nullable: true
        messageType:
          type: string
          enum: [text, file, image, system]
        message_type:
          type: string
        content:
          type: string
        fileUrl:
          type: string
          nullable: true
        file_url:
          type: string
          nullable: true
        fileName:
          type: string
          nullable: true
        file_name:
          type: string
          nullable: true
        replyToId:
          type: string
          nullable: true
        reply_to_id:
          type: string
          nullable: true
        isApproved:
          type: boolean
          nullable: true
        is_approved:
          type: boolean
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ---------------------------------------------------------------- Wallet
    Wallet:
      type: object
      properties:
        _id:
          type: string
        id:
          type: string
        userId:
          type: string
        user_id:
          type: string
        role:
          type: string
        balance:
          type: number
        currency:
          type: string
          default: INR
        lockedAmount:
          type: number
        locked_amount:
          type: number
        totalCredited:
          type: number
        total_credited:
          type: number
        totalDebited:
          type: number
        total_debited:
          type: number
        totalWithdrawn:
          type: number
        total_withdrawn:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Transaction:
      type: object
      properties:
        _id:
          type: string
        id:
          type: string
        walletId:
          type: string
        wallet_id:
          type: string
        type:
          type: string
          enum: [credit, debit, transfer, topup, withdrawal, payout, refund]
        amount:
          type: number
        balance:
          type: number
          description: Wallet balance after this transaction
        description:
          type: string
          nullable: true
        reference:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, completed, failed, cancelled]
        createdAt:
          type: string
          format: date-time

    EarningsSummary:
      type: object
      properties:
        balance:
          type: number
        totalCredited:
          type: number
        totalDebited:
          type: number
        totalWithdrawn:
          type: number
        lockedAmount:
          type: number
        thisMonthEarnings:
          type: number

    Payout:
      type: object
      properties:
        _id:
          type: string
        id:
          type: string
        walletId:
          type: string
        amount:
          type: number
        payoutMethod:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        createdAt:
          type: string
          format: date-time

    # ---------------------------------------------------------------- Data export
    UserExport:
      type: object
      properties:
        exported_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
        wallet:
          $ref: '#/components/schemas/UserWallet'
        transactions:
          type: array
          items:
            type: object
        projects:
          type: array
          items:
            type: object

    # ------------------------------------------------------------- Notification
    Notification:
      type: object
      properties:
        _id:
          type: string
        id:
          type: string
        userId:
          type: string
        title:
          type: string
        message:
          type: string
        type:
          type: string
        read:
          type: boolean
        data:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ------------------------------------------------------------- Support
    SupportTicket:
      type: object
      properties:
        _id:
          type: string
        id:
          type: string
        userId:
          type: string
        userName:
          type: string
        subject:
          type: string
        description:
          type: string
        category:
          type: string
        priority:
          type: string
          enum: [low, medium, high, urgent]
        status:
          type: string
          enum: [open, in_progress, resolved, closed, reopened]
        assignedTo:
          type: string
          nullable: true
        messages:
          type: array
          items:
            $ref: '#/components/schemas/TicketMessage'
        satisfaction_rating:
          type: integer
          nullable: true
        satisfaction_feedback:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TicketMessage:
      type: object
      properties:
        _id:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        message:
          type: string
        attachmentUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    FAQ:
      type: object
      properties:
        _id:
          type: string
        id:
          type: string
        question:
          type: string
        answer:
          type: string
        category:
          type: string
        helpfulCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ------------------------------------------------------------- Community
    CommunityPost:
      type: object
      properties:
        _id:
          type: string
        id:
          type: string
        userId:
          type: string
        postType:
          type: string
        title:
          type: string
        content:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        likes:
          type: array
          items:
            type: string
        likeCount:
          type: integer
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        commentCount:
          type: integer
        savedBy:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        content:
          type: string
        parentId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Expert:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        specialization:
          type: string
        category:
          type: string
        bio:
          type: string
        avatar:
          type: string
        hourlyRate:
          type: number
        rating:
          type: number
        reviewCount:
          type: integer
        featured:
          type: boolean
        status:
          type: string
          enum: [active, inactive]
        availability:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ExpertBooking:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        expertId:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
        topic:
          type: string
        notes:
          type: string
        duration:
          type: integer
        hourlyRate:
          type: number
        amount:
          type: number
        paymentId:
          type: string
        meetLink:
          type: string
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled]
        createdAt:
          type: string
          format: date-time

    TrainingModule:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        content:
          type: string
        role:
          type: string
        order:
          type: integer
        createdAt:
          type: string
          format: date-time

    TrainingProgress:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        moduleId:
          type: string
        progress:
          type: number
        completed:
          type: boolean
        updatedAt:
          type: string
          format: date-time

    QuizQuestion:
      type: object
      properties:
        _id:
          type: string
        moduleId:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: integer

    QuizAttempt:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        moduleId:
          type: string
        score:
          type: number
        passed:
          type: boolean
        totalQuestions:
          type: integer
        createdAt:
          type: string
          format: date-time

    MarketplaceListing:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
        price:
          type: number
        images:
          type: array
          items:
            type: string
        sellerId:
          type: string
        status:
          type: string
          enum: [active, sold, removed]
        favoriteCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Job:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        company:
          type: string
        description:
          type: string
        category:
          type: string
        type:
          type: string
          enum: [full-time, part-time, internship, contract, freelance]
        remote:
          type: boolean
        location:
          type: string
        salary:
          type: string
        requirements:
          type: array
          items:
            type: string
        applicationCount:
          type: integer
        status:
          type: string
          enum: [active, closed]
        createdAt:
          type: string
          format: date-time

    JobApplication:
      type: object
      properties:
        _id:
          type: string
        jobId:
          type: string
        userId:
          type: string
        resumeUrl:
          type: string
        coverLetter:
          type: string
        status:
          type: string
          enum: [pending, reviewed, shortlisted, rejected, hired]
        createdAt:
          type: string
          format: date-time

    Investor:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        firm:
          type: string
        bio:
          type: string
        avatar:
          type: string
        stage:
          type: string
        sectors:
          type: array
          items:
            type: string
        portfolio:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
          format: date-time

    PitchDeck:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        title:
          type: string
        description:
          type: string
        fileUrl:
          type: string
        investorId:
          type: string
        status:
          type: string
          enum: [pending, reviewed, accepted, rejected]
        feedback:
          type: string
        createdAt:
          type: string
          format: date-time

    AccessRequest:
      type: object
      properties:
        _id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        fullName:
          type: string
        metadata:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time

    AuditLog:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        action:
          type: string
        details:
          type: object
          additionalProperties: true
        ip:
          type: string
        createdAt:
          type: string
          format: date-time

    AdminDashboardStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalDoers:
          type: integer
        totalSupervisors:
          type: integer
        totalProjects:
          type: integer
        activeProjects:
          type: integer
        totalRevenue:
          type: number
        pendingPayouts:
          type: number

paths:
  # ====================================================================== AUTH
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and optional password
      description: |
        Authenticates a user. For admin accounts a password is checked.
        In development mode passwordless login is allowed for all roles.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  description: Required for admin login in production
                role:
                  type: string
                  enum: [user, student, professional, business, doer, supervisor, admin]
                  default: user
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Missing email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No account found for this email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/dev-login:
    post:
      tags: [Auth]
      summary: Development-only passwordless login
      description: Bypasses authentication for local development. Creates an account if one does not exist.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [user, student, professional, business, doer, supervisor, admin]
                  default: user
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Email is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/check-account:
    post:
      tags: [Auth]
      summary: Check if an account exists for a given email and role
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
      responses:
        '200':
          description: Account status returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  exists:
                    type: boolean
                  needsOnboarding:
                    type: boolean
        '400':
          description: Email is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/send-otp:
    post:
      tags: [Auth]
      summary: Send a one-time password to an email
      description: |
        Sends an OTP for login or signup. In dev mode the OTP is logged
        to `/private/tmp/api-server.log` with a `[DEV-OTP]` prefix.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, purpose, role]
              properties:
                email:
                  type: string
                  format: email
                purpose:
                  type: string
                  enum: [login, signup]
                role:
                  type: string
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  otpId:
                    type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/verify:
    post:
      tags: [Auth]
      summary: Verify an OTP and receive tokens
      description: Verifies the OTP sent to the user's email. On success returns JWT tokens and user data.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp, purpose, role]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                purpose:
                  type: string
                  enum: [login, signup]
                role:
                  type: string
      responses:
        '200':
          description: OTP verified, tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Missing fields or invalid purpose
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/doer-signup:
    post:
      tags: [Auth]
      summary: Register a new doer account
      description: Creates a doer account after OTP verification. Returns 201 on success.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp, fullName, metadata]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                fullName:
                  type: string
                metadata:
                  type: object
                  description: Additional doer profile data (skills, university, etc.)
                  additionalProperties: true
      responses:
        '201':
          description: Doer account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  doer:
                    $ref: '#/components/schemas/Doer'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/supervisor-signup:
    post:
      tags: [Auth]
      summary: Register a new supervisor account
      description: Creates a supervisor account after OTP verification. Returns 201 on success.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp, fullName, metadata]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                fullName:
                  type: string
                metadata:
                  type: object
                  description: Additional supervisor profile data (expertise, etc.)
                  additionalProperties: true
      responses:
        '201':
          description: Supervisor account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  supervisor:
                    $ref: '#/components/schemas/Supervisor'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/access-status:
    get:
      tags: [Auth]
      summary: Check access/activation status for a role
      description: Returns whether an account exists and its activation state for doer or supervisor roles.
      security: []
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
        - name: role
          in: query
          required: false
          schema:
            type: string
            enum: [user, student, professional, business, doer, supervisor]
      responses:
        '200':
          description: Status returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [approved, pending, rejected, not_found]
                  isActivated:
                    type: boolean
                    description: Present for doer/supervisor roles
        '400':
          description: Email is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/access-request:
    get:
      tags: [Auth]
      summary: Check access request status
      description: Returns whether an account needs onboarding (used by supervisor flow).
      security: []
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
        - name: role
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Access request status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [approved, pending, rejected]
                  needsOnboarding:
                    type: boolean
        '400':
          description: Email is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/supervisor-status:
    get:
      tags: [Auth]
      summary: Check supervisor-specific access status
      description: Checks AccessRequest collection and Supervisor collection for activation state.
      security: []
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Supervisor status returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [approved, pending, rejected, not_found]
                  isActivated:
                    type: boolean
        '400':
          description: Email is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Exchanges a valid refresh token for a new access/refresh token pair.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        '400':
          description: Refresh token is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and invalidate refresh token
      description: Removes the refresh token from the user's stored tokens.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  description: Optional; if omitted all refresh tokens are cleared
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      description: Returns the full account document for the JWT subject, with role and userType appended.
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/User'
                  - type: object
                    properties:
                      role:
                        type: string
                      userType:
                        type: string
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # =================================================================== USERS
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile with wallet
      description: Returns the authenticated user's profile including wallet balance. Also available at `/api/profiles/me`.
      responses:
        '200':
          description: User profile with wallet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Users]
      summary: Update current user profile
      description: |
        Updates allowed profile fields. Permitted fields: fullName, phone,
        onboardingStep, onboardingCompleted, userType, universityId, courseId,
        semester, yearOfStudy, studentIdNumber, expectedGraduationYear,
        collegeEmail, preferredSubjects, professionalType, industryId,
        jobTitle, companyName, linkedinUrl, businessType, gstNumber.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                phone:
                  type: string
                onboardingStep:
                  type: integer
                onboardingCompleted:
                  type: boolean
                userType:
                  type: string
                  enum: [student, professional, business]
                universityId:
                  type: string
                courseId:
                  type: string
                semester:
                  type: integer
                yearOfStudy:
                  type: integer
                studentIdNumber:
                  type: string
                expectedGraduationYear:
                  type: integer
                collegeEmail:
                  type: string
                  format: email
                preferredSubjects:
                  type: array
                  items:
                    type: string
                professionalType:
                  type: string
                industryId:
                  type: string
                jobTitle:
                  type: string
                companyName:
                  type: string
                linkedinUrl:
                  type: string
                businessType:
                  type: string
                gstNumber:
                  type: string
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/avatar:
    post:
      tags: [Users]
      summary: Upload user avatar
      description: Accepts a multipart file upload (field name `avatar`, max 5 MB) and stores it on Cloudinary.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  avatarUrl:
                    type: string
        '400':
          description: No file provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/search:
    get:
      tags: [Users]
      summary: Search for a user by email
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Search result (user may be null)
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    nullable: true
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      full_name:
                        type: string
                      avatar_url:
                        type: string
                        nullable: true
                      user_type:
                        type: string
        '400':
          description: Email is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/preferences:
    get:
      tags: [Users]
      summary: Get current user preferences (wrapped)
      description: "Returns preferences wrapped in {preferences: {...}}."
      responses:
        '200':
          description: Preferences object
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferences:
                    type: object
                    additionalProperties: true
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Users]
      summary: Update current user preferences (wrapped)
      description: "Merges provided keys into existing preferences. Returns {preferences: {...}}."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferences:
                    type: object
                    additionalProperties: true
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/preferences:
    get:
      tags: [Users]
      summary: Get current user preferences (raw)
      description: Returns the raw preferences object directly (no wrapper).
      responses:
        '200':
          description: Preferences
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Users]
      summary: Update current user preferences (raw)
      description: Merges provided keys into existing preferences. Returns the raw merged object.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Merged preferences
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/export:
    get:
      tags: [Users]
      summary: Export all user data
      description: Returns the user profile, wallet, transactions (up to 500), and projects.
      responses:
        '200':
          description: Exported data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserExport'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/referral:
    get:
      tags: [Users]
      summary: Get referral information
      description: Returns referral code, total referrals, and earnings for the current user.
      responses:
        '200':
          description: Referral data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Referral'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/payment-methods:
    get:
      tags: [Users]
      summary: List payment methods
      responses:
        '200':
          description: Payment methods list
          content:
            application/json:
              schema:
                type: object
                properties:
                  paymentMethods:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentMethod'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Users]
      summary: Add a payment method
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '201':
          description: Payment method created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethod'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
