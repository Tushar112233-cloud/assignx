  # =================================================================== UPLOAD
  /upload:
    post:
      tags: [Upload]
      summary: Upload a file to Cloudinary
      description: Accepts a single file (field name `file`, max 25 MB). Optionally specify a folder.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                folder:
                  type: string
                  default: assignx
                  description: Cloudinary folder path
      responses:
        '200':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'
        '400':
          description: No file provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Upload]
      summary: Delete a file from Cloudinary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [publicId]
              properties:
                publicId:
                  type: string
      responses:
        '200':
          description: File deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '400':
          description: publicId is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

